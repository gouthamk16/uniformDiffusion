<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Decoder Visualizer</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --line:#30363d; --txt:#e6edf3; --muted:#8b949e;
          --type:#79c0ff; --cfg:#a5d6ff; --name:#d2a8ff; --hit:#9e6a03; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 ui-monospace,SFMono-Regular,Consolas,monospace;
         background:var(--bg); color:var(--txt); }
  header { position:sticky; top:0; background:var(--panel); border-bottom:1px solid var(--line);
           padding:12px 16px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; z-index:1; }
  header h1 { font-size:15px; margin:0 12px 0 0; }
  input[type=search] { background:var(--bg); border:1px solid var(--line); color:var(--txt);
           padding:6px 10px; border-radius:6px; min-width:220px; }
  button, label.btn { background:var(--bg); border:1px solid var(--line); color:var(--txt);
           padding:6px 10px; border-radius:6px; cursor:pointer; }
  button:hover, label.btn:hover { border-color:var(--type); }
  #tree { padding:16px; }
  .node { margin-left:18px; border-left:1px dotted var(--line); padding-left:10px; }
  .row { display:flex; align-items:baseline; gap:6px; padding:1px 0; cursor:default; }
  .row.clickable { cursor:pointer; }
  .tog { width:14px; color:var(--muted); user-select:none; }
  .name { color:var(--name); }
  .type { color:var(--type); }
  .cfg { color:var(--cfg); }
  .muted { color:var(--muted); }
  .hit { background:var(--hit); border-radius:3px; padding:0 3px; }
  .hidden { display:none; }
</style>
</head>

<script>
const treeEl = document.getElementById("tree");
let leafCount = 0, moduleCount = 0;

function render(name, node, depth) {
  moduleCount++;
  const wrap = document.createElement("div");
  wrap.className = "node";

  const row = document.createElement("div");
  row.className = "row";
  const kids = node.children ? Object.entries(node.children) : [];
  if (!kids.length) leafCount++;

  const tog = document.createElement("span");
  tog.className = "tog";
  row.appendChild(tog);

  const label = document.createElement("span");
  let html = "";
  if (name !== null) html += `<span class="name">${name}</span><span class="muted">:</span> `;
  html += `<span class="type">${node.type}</span>`;
  if (node.config) html += ` <span class="cfg">(${node.config})</span>`;
  if (kids.length) html += ` <span class="muted">{${kids.length}}</span>`;
  label.innerHTML = html;
  row.appendChild(label);
  wrap.appendChild(row);

  if (kids.length) {
    row.classList.add("clickable");
    const childBox = document.createElement("div");
    const collapsed = depth >= 2;
    tog.textContent = collapsed ? "▶" : "▼";
    if (collapsed) childBox.classList.add("hidden");
    row.onclick = () => {
      const hid = childBox.classList.toggle("hidden");
      tog.textContent = hid ? "▶" : "▼";
    };
    for (const [cName, cNode] of kids) childBox.appendChild(render(cName, cNode, depth + 1));
    wrap.appendChild(childBox);
  }
  return wrap;
}

function load(data) {
  treeEl.innerHTML = "";
  leafCount = 0; moduleCount = 0;
  treeEl.appendChild(render(null, data, 0));
  document.getElementById("stats").textContent = `${moduleCount} modules · ${leafCount} leaves`;
}

function setOpen(open) {
  document.querySelectorAll(".node > div:not(.row)").forEach(b => b.classList.toggle("hidden", !open));
  document.querySelectorAll(".tog").forEach(t => { if (t.textContent) t.textContent = open ? "▼" : "▶"; });
}

function filter(term) {
  term = term.trim().toLowerCase();
  document.querySelectorAll(".node").forEach(n => n.classList.remove("hidden"));
  document.querySelectorAll(".hit").forEach(h => h.classList.remove("hit"));
  if (!term) return;
  const nodes = [...document.querySelectorAll("#tree .node")];
  const match = n => n.querySelector(":scope > .row").textContent.toLowerCase().includes(term);
  nodes.forEach(n => { if (match(n)) {
    n.querySelector(":scope > .row > span:nth-child(2)").classList.add("hit");
    let p = n; while (p && p.classList.contains("node")) {
      p.classList.remove("hidden");
      const box = p.parentElement;
      if (box && box.classList.contains("hidden")) box.classList.remove("hidden");
      p = p.parentElement.closest(".node");
    }
  }});
  nodes.forEach(n => {
    if (n.classList.contains("hidden")) return;
    const self = match(n);
    const childHit = n.querySelector(".node .hit, :scope > .row .hit");
    if (!self && !childHit) n.classList.add("hidden");
  });
}

document.getElementById("expand").onclick = () => setOpen(true);
document.getElementById("collapse").onclick = () => setOpen(false);
document.getElementById("q").oninput = e => filter(e.target.value);
document.getElementById("file").onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => { try { load(JSON.parse(r.result)); } catch (err) { alert("Bad JSON: " + err.message); } };
  r.readAsText(f);
};

load(JSON.parse(document.getElementById("data").textContent));
</script>
